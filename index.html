<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENSI KR XIT | Access Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg-color: #030712;
            --card-bg: #111827;
            --border-color: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --input-bg: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at top center, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
        }

        .portal-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            padding: 32px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
        }

        .header {
            margin-bottom: 32px;
            text-align: center;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 16px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: var(--success-color);
            border-radius: 50%;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .key-input {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 16px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            text-align: center;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.2s ease;
        }

        .key-input.active {
            color: var(--text-primary);
            border-color: var(--accent-color);
            background-color: rgba(59, 130, 246, 0.05);
        }

        .action-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border: none;
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: var(--accent-hover);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 24px 0;
        }

        .vip-link {
            display: block;
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .vip-link:hover {
            color: var(--text-primary);
        }

        /* SPINNER ANIMATION */
        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* TOAST NOTIFICATION */
        .toast-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background-color: #1f2937;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid #374151;
            opacity: 0;
            transform: translateY(20px);
            animation: toastIn 0.3s ease forwards, toastOut 0.3s ease 2.5s forwards;
        }

        @keyframes toastIn {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastOut {
            to { opacity: 0; transform: translateY(20px); }
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 100%;
            max-width: 360px;
            padding: 32px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .modal-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .modal-btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-success {
            background-color: var(--success-color);
            color: #fff;
            border: none;
        }

        .btn-success:hover {
            background-color: #059669;
        }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="portal-card">
        <div class="header">
            <div class="status-badge">
                <div class="status-dot"></div>
                System Operational
            </div>
            <h1 class="title">SENSI KR XIT</h1>
            <p class="subtitle">Authentication Portal</p>
        </div>

        <div class="input-group">
            <label class="input-label">Access Signature</label>
            <input type="text" id="keyDisplay" class="key-input" value="AWAITING_GENERATION" readonly>
        </div>

        <div class="action-container">
            <button class="btn btn-primary" id="generateBtn" onclick="generateToken()">
                <span id="btnText">Generate Token</span>
                <div class="spinner" id="btnSpinner"></div>
            </button>
            <button class="btn btn-secondary" onclick="copyToken()">
                Copy to Clipboard
            </button>
        </div>

        <div class="divider"></div>

        <a class="vip-link" onclick="openModal()">Upgrade to Lifetime License</a>
    </div>

    <div class="modal-overlay" id="vipModal">
        <div class="modal-content">
            <h2 class="modal-title">Lifetime License</h2>
            <p class="modal-desc">Upgrade for permanent access, automated token verification, and hardware-locked security integration.</p>
            
            <div class="modal-btn-group">
                <button class="btn btn-success" onclick="window.open('https://wa.me/+6281225980437')">Contact Admin 1</button>
                <button class="btn btn-success" onclick="window.open('https://wa.me/+6285798209865')">Contact Admin 2</button>
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Disable context menu for security
        document.addEventListener('contextmenu', e => e.preventDefault());

        // Toast Notification System
        function showToast(message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            container.appendChild(toast);
            
            setTimeout(() => {
                if (container.contains(toast)) {
                    toast.remove();
                }
            }, 3000);
        }

        // Modal Logic
        const modal = document.getElementById('vipModal');
        function openModal() {
            modal.style.display = 'flex';
        }
        function closeModal() {
            modal.style.display = 'none';
        }

        // Generation Logic (Realistic API Simulation)
        let isGenerated = false;

        function generateToken() {
            const btn = document.getElementById('generateBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('btnSpinner');
            const keyDisplay = document.getElementById('keyDisplay');

            // Set loading state
            btn.disabled = true;
            btnText.innerText = "Authenticating...";
            spinner.style.display = "block";
            keyDisplay.value = "PROCESSING...";
            keyDisplay.classList.remove('active');

            // Simulate network request (1.5 seconds)
            setTimeout(() => {
                // Generate actual key logic
                const today = new Date();
                const dateString = today.getFullYear() + "-" + String(today.getMonth() + 1).padStart(2, '0') + "-" + String(today.getDate()).padStart(2, '0');
                const generatedKey = btoa(dateString + "_XIT_SECRET_VIP"); 

                // Update UI with success state
                keyDisplay.value = generatedKey;
                keyDisplay.classList.add('active');
                
                btn.disabled = false;
                btnText.innerText = "Generate New Token";
                spinner.style.display = "none";
                
                isGenerated = true;
                showToast("Token successfully generated.");
            }, 1500);
        }

        // Clipboard Logic
        function copyToken() {
            const keyDisplay = document.getElementById('keyDisplay');
            
            if (!isGenerated) {
                showToast("Please generate a token first.");
                return;
            }

            // Fallback copy method for broad mobile support
            const textArea = document.createElement("textarea");
            textArea.value = keyDisplay.value;
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                showToast("Token copied to clipboard.");
            } catch (err) {
                showToast("Failed to copy token.");
            }
            
            document.body.removeChild(textArea);
        }
    </script>
</body>
</html>
