<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSI KR XIT | Aegis Hyperspace</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #030008;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            perspective: 1000px;
        }

        /* 3D HYPERSPACE GRID BACKGROUND */
        .grid-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            perspective: 600px;
            overflow: hidden;
            z-index: -3;
        }
        .grid-plane {
            width: 200%; height: 200%;
            position: absolute;
            bottom: -30%; left: -50%;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.3) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(75deg);
            animation: gridMove 1.5s linear infinite;
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 60%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 60%);
        }
        @keyframes gridMove {
            0% { transform: rotateX(75deg) translateY(0); }
            100% { transform: rotateX(75deg) translateY(50px); }
        }

        /* AMBIENT FOG */
        .ambient-fog {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 40%, rgba(176, 0, 255, 0.1) 0%, rgba(0, 229, 255, 0.05) 40%, transparent 80%);
            z-index: -2;
        }

        /* EMP SHOCKWAVE */
        .emp-shockwave {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 15px; height: 15px;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(0,229,255,0.6) 30%, transparent 80%);
            border-radius: 50%; z-index: 999; pointer-events: none; opacity: 0;
        }
        .emp-active { animation: empExplode 1s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; }
        @keyframes empExplode {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            50% { opacity: 0.9; }
            100% { transform: translate(-50%, -50%) scale(250); opacity: 0; }
        }

        /* GLITCH EFFECT */
        .glitch-active { animation: cardGlitch 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite; }
        @keyframes cardGlitch {
            0% { transform: translate(0) skew(0deg); filter: hue-rotate(0deg) contrast(1); }
            20% { transform: translate(-8px, 8px) skew(-8deg); filter: hue-rotate(180deg) contrast(2); }
            40% { transform: translate(8px, -8px) skew(8deg); filter: invert(0.4); }
            60% { transform: translate(-3px, 3px) skew(-3deg); filter: hue-rotate(-90deg); }
            80% { transform: translate(3px, -3px) skew(3deg); filter: invert(0); }
            100% { transform: translate(0) skew(0deg); filter: hue-rotate(0deg); }
        }

        /* HOLOGRAPHIC GLASS CARD */
        .card-wrapper {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            z-index: 1;
        }

        .glass-card {
            background: rgba(10, 12, 18, 0.65);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 32px;
            padding: 45px 35px;
            width: 380px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9), inset 0 1px 20px rgba(255, 255, 255, 0.05);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* HOLOGRAPHIC SHIMMER EFFECT */
        .holo-shimmer {
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(
                135deg, 
                transparent 20%, 
                rgba(0, 229, 255, 0.1) 40%, 
                rgba(176, 0, 255, 0.15) 50%, 
                rgba(255, 42, 95, 0.1) 60%, 
                transparent 80%
            );
            transform: translateZ(0);
            pointer-events: none;
            mix-blend-mode: color-dodge;
            transition: transform 0.1s ease-out;
            z-index: 0;
        }

        .content-layer { position: relative; z-index: 2; }

        .status-badge {
            background: rgba(176, 0, 255, 0.1); color: #d080ff; padding: 6px 16px; border-radius: 20px;
            font-size: 10px; font-weight: 900; letter-spacing: 3px; display: inline-flex; align-items: center;
            margin-bottom: 15px; border: 1px solid rgba(176, 0, 255, 0.3);
        }
        .status-badge::before {
            content: ''; width: 6px; height: 6px; background: #d080ff; border-radius: 50%;
            margin-right: 8px; box-shadow: 0 0 10px #d080ff; animation: pulseDot 1.5s infinite;
        }
        @keyframes pulseDot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .app-title { font-size: 38px; font-weight: 900; color: #ffffff; letter-spacing: -2px; margin-bottom: 2px; text-shadow: 0 0 20px rgba(0,229,255,0.3); }
        .subtitle { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 400; color: #00e5ff; margin-bottom: 35px; letter-spacing: 1px; }

        .input-group { position: relative; margin-bottom: 30px; }

        .key-input {
            background: rgba(0, 0, 0, 0.8); border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 16px;
            padding: 22px; width: 100%; color: #00ffcc; font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; text-align: center;
            outline: none; letter-spacing: 3px; transition: all 0.3s ease; box-shadow: inset 0 5px 25px rgba(0,0,0,0.9);
        }
        .key-input.locked { color: transparent; text-shadow: 0 0 12px rgba(176, 0, 255, 0.8); letter-spacing: 6px; }

        /* ADVANCED BIOMETRIC SCANNER */
        .bio-container { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 25px; position: relative; }
        
        .bio-btn {
            width: 90px; height: 90px; border-radius: 50%;
            background: #050508;
            border: 2px solid rgba(176, 0, 255, 0.3);
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; position: relative; z-index: 2;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9), inset 0 0 30px rgba(176, 0, 255, 0.1);
            transition: all 0.2s; overflow: hidden;
        }

        /* SVG Fingerprint Representation */
        .bio-icon {
            width: 40px; height: 40px; position: relative; z-index: 3;
            background-image: radial-gradient(circle, transparent 30%, rgba(0,229,255,0.4) 31%, rgba(0,229,255,0.4) 40%, transparent 41%, transparent 50%, rgba(0,229,255,0.4) 51%, rgba(0,229,255,0.4) 60%, transparent 61%, transparent 70%, rgba(0,229,255,0.4) 71%, rgba(0,229,255,0.4) 80%, transparent 81%);
            border-radius: 50%; transition: all 0.3s;
        }

        .scanner-laser {
            position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: #00e5ff; box-shadow: 0 0 15px #00e5ff;
            z-index: 4; display: none;
        }

        .bio-btn:active { transform: scale(0.92); box-shadow: 0 5px 20px rgba(0,0,0,0.9), inset 0 0 40px rgba(0, 229, 255, 0.3); border-color: #00e5ff; }
        .bio-btn:active .bio-icon { background-image: radial-gradient(circle, transparent 30%, #00e5ff 31%, #00e5ff 40%, transparent 41%, transparent 50%, #00e5ff 51%, #00e5ff 60%, transparent 61%, transparent 70%, #00e5ff 71%, #00e5ff 80%, transparent 81%); filter: drop-shadow(0 0 5px #00e5ff); }
        .bio-btn:active .scanner-laser { display: block; animation: laserScan 1s linear infinite alternate; }

        @keyframes laserScan { 0% { top: 10%; } 100% { top: 90%; } }

        .progress-ring { position: absolute; top: -8px; left: -8px; width: 106px; height: 106px; pointer-events: none; transform: rotate(-90deg); }
        .progress-circle { fill: none; stroke: #00e5ff; stroke-width: 4; stroke-dasharray: 295; stroke-dashoffset: 295; transition: stroke-dashoffset 0.1s linear; filter: drop-shadow(0 0 8px #00e5ff); }

        .bio-text { margin-top: 20px; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; color: #8a8a9e; letter-spacing: 2px; transition: color 0.3s; }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px 20px; width: 100%; border-radius: 16px; font-size: 14px; font-weight: 800;
            cursor: pointer; transition: all 0.3s; letter-spacing: 1px; display: block;
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(0, 229, 255, 0.4); box-shadow: 0 10px 20px rgba(0,229,255,0.1); }
        .btn-secondary:active { transform: scale(0.98); }

        .btn-vip-link {
            color: #ffcc00; font-size: 13px; font-weight: 800; text-decoration: none; cursor: pointer;
            transition: all 0.3s; display: flex; align-items: center; padding: 16px 0; width: 100%; justify-content: center;
            border-radius: 16px; background: rgba(255, 204, 0, 0.05); border: 1px solid rgba(255, 204, 0, 0.2); margin-top: 15px;
            letter-spacing: 1px; text-transform: uppercase;
        }
        .btn-vip-link:hover { background: rgba(255, 204, 0, 0.15); box-shadow: 0 0 25px rgba(255, 204, 0, 0.25); transform: translateY(-2px); }

        /* LIVE ACTIVITY FEED */
        .activity-feed { position: fixed; bottom: 25px; left: 25px; z-index: 50; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .feed-item {
            background: rgba(5, 5, 8, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(0,229,255,0.1);
            padding: 12px 18px; border-radius: 8px; font-family: 'Space Mono', monospace; font-size: 10px; color: #aaa;
            display: flex; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            animation: slideUp 0.4s ease forwards, fadeOut 0.4s 4s forwards; opacity: 0; transform: translateY(20px); border-left: 3px solid #00e5ff;
        }
        .feed-item span.highlight { color: #00e5ff; margin-left: 5px;}
        .feed-item span.vip { color: #ffcc00; margin-left: 5px; }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        /* TOAST NOTIFICATION */
        .toast-container { position: fixed; top: 25px; right: 25px; z-index: 1000; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .toast {
            background: rgba(176, 0, 255, 0.9); backdrop-filter: blur(10px); color: #fff; padding: 16px 24px; border-radius: 12px;
            font-size: 13px; font-weight: 700; box-shadow: 0 15px 40px rgba(176,0,255,0.4);
            animation: slideInRight 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards, slideOutRight 0.5s 3.5s forwards; opacity: 0; transform: translateX(120%);
        }

        /* VIP MODAL */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(12px); z-index: 100; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.4s; }
        .modal-card { background: #07070a; border: 1px solid rgba(255, 204, 0, 0.4); border-radius: 32px; padding: 45px 35px; width: 360px; text-align: center; transform: translateY(30px) scale(0.95); transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9), inset 0 2px 30px rgba(255, 204, 0, 0.1); }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-overlay.active .modal-card { transform: translateY(0) scale(1); }
        .modal-title { font-size: 26px; font-weight: 900; color: #ffffff; margin-bottom: 5px; text-transform: uppercase; }
        .modal-price { font-size: 38px; font-weight: 900; color: #ffcc00; margin-bottom: 30px; font-family: 'Space Mono', monospace;}
        .modal-features { text-align: left; margin-bottom: 35px; }
        .feature-item { font-size: 13px; color: #a0a0b0; margin-bottom: 15px; display: flex; font-weight: 400; line-height: 1.5; }
        .feature-item::before { content: '◈'; color: #ffcc00; font-weight: bold; margin-right: 12px; font-size: 14px; }
        .founder-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .btn-founder { background: rgba(37, 211, 102, 0.1); color: #25D366; border: 1px solid rgba(37, 211, 102, 0.3); padding: 16px; border-radius: 14px; font-size: 12px; font-weight: 800; cursor: pointer; transition: all 0.3s; }
        .btn-founder:hover { background: #25D366; color: #fff; transform: translateY(-3px); box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4); border-color: #25D366; }
        .btn-close { background: transparent; color: #8a8a9e; border: none; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: color 0.2s; }
        .btn-close:hover { color: #fff; }

        /* INIT OVERLAY */
        #initOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; color: #00e5ff; font-family: 'Space Mono', monospace; font-size: 14px; letter-spacing: 5px; cursor: pointer; transition: opacity 0.5s; }
        .init-pulse { animation: pulse 1.5s infinite; }
    </style>
</head>
<body>

    <div id="initOverlay" onclick="initializeSystem()">
        <div class="init-pulse">INITIATE UPLINK</div>
    </div>

    <div class="grid-container"><div class="grid-plane"></div></div>
    <div class="ambient-fog"></div>

    <div id="empShockwave" class="emp-shockwave"></div>

    <div class="activity-feed" id="activityFeed"></div>
    <div class="toast-container" id="toastContainer"></div>

    <div class="card-wrapper" id="cardWrapper">
        <div class="glass-card" id="mainCard">
            <div class="holo-shimmer" id="holoShimmer"></div>
            
            <div class="content-layer">
                <div class="status-badge">AEGIS PROTOCOL</div>
                <div class="app-title">SENSI KR XIT</div>
                <p class="subtitle">QUANTUM ENCRYPTION NODE</p>

                <div class="input-group">
                    <input type="text" id="keyDisplay" class="key-input locked" value="••••••••••••" readonly>
                </div>

                <div class="bio-container" id="bioContainer">
                    <div class="bio-btn" id="bioBtn">
                        <div class="bio-icon"></div>
                        <div class="scanner-laser"></div>
                    </div>
                    <svg class="progress-ring">
                        <circle class="progress-circle" id="progressCircle" cx="53" cy="53" r="47"></circle>
                    </svg>
                    <div class="bio-text" id="bioText">AWAITING BIOMETRICS</div>
                </div>
                
                <button class="btn-secondary" onclick="copyKey()">COPY SIGNATURE</button>

                <span class="btn-vip-link" onclick="openModal()">OBTAIN LIFETIME CLEARANCE</span>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="vipModal">
        <div class="modal-card">
            <div class="modal-badge">TIER 1 ACCESS</div>
            <div class="modal-title">LIFETIME VIP</div>
            <div class="modal-price">Rp 45.000</div>
            
            <div class="modal-features">
                <div class="feature-item">Koneksi permanen tanpa batas</div>
                <div class="feature-item">Bypass otorisasi sidik jari harian</div>
                <div class="feature-item">Prioritas server Stealth & Anti-Ban</div>
                <div class="feature-item">Enkripsi Hardware ID (HWID Locked)</div>
            </div>

            <div class="founder-grid">
                <button class="btn-founder" onclick="window.location.href='https://wa.me/+6281225980437'">SYS ADMIN 1</button>
                <button class="btn-founder" onclick="window.location.href='https://wa.me/+6285798209865'">SYS ADMIN 2</button>
            </div>
            
            <button class="btn-close" onclick="closeModal()">Abort Sequence</button>
        </div>
    </div>

    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) { if(event.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 67 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false; }

        // AUDIO ENGINE
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let droneGain;

        function startAmbientDrone() {
            if(droneGain) return;
            const osc = audioCtx.createOscillator(); osc.type = 'square'; osc.frequency.value = 35; 
            droneGain = audioCtx.createGain(); droneGain.gain.value = 0;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 200;
            osc.connect(filter); filter.connect(droneGain); droneGain.connect(audioCtx.destination);
            osc.start(); droneGain.gain.setTargetAtTime(0.01, audioCtx.currentTime, 4);
        }

        function playSound(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if(type === 'charge') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 1.2);
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.2);
                osc.start(); osc.stop(audioCtx.currentTime + 1.2);
            } else if(type === 'emp') {
                osc.type = 'square'; osc.frequency.setValueAtTime(50, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.6);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
                osc.start(); osc.stop(audioCtx.currentTime + 0.6);
            } else if(type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(2000, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            }
        }

        function speakVoice(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US'; utterance.rate = 1.2; utterance.pitch = 0.5; // Deeper robot voice
                window.speechSynthesis.speak(utterance);
            }
        }

        function initializeSystem() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            startAmbientDrone(); playSound('click');
            const overlay = document.getElementById('initOverlay');
            overlay.style.opacity = '0'; setTimeout(() => overlay.style.display = 'none', 500);
        }

        // HOLOGRAPHIC TILT & SHIMMER
        const cardWrapper = document.getElementById('cardWrapper');
        const holoShimmer = document.getElementById('holoShimmer');
        
        document.addEventListener('mousemove', (e) => {
            if(window.innerWidth > 768) {
                let xAxis = (window.innerWidth / 2 - e.pageX) / 30;
                let yAxis = (window.innerHeight / 2 - e.pageY) / 30;
                cardWrapper.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
                
                // Move the hologram gradient based on mouse
                let shimmerX = (e.pageX / window.innerWidth) * 100 - 50;
                let shimmerY = (e.pageY / window.innerHeight) * 100 - 50;
                holoShimmer.style.transform = `translate(${shimmerX}%, ${shimmerY}%) translateZ(0)`;
            }
        });
        
        document.addEventListener('mouseleave', () => {
            cardWrapper.style.transform = `rotateY(0deg) rotateX(0deg)`;
            holoShimmer.style.transform = `translate(0%, 0%) translateZ(0)`;
        });

        // ACTIVITY FEED
        const feedActions = [{text:"requested node access", type:"highlight"}, {text:"acquired Tier 1 VIP", type:"vip"}];
        function spawnFeed() {
            const container = document.getElementById('activityFeed');
            const item = document.createElement('div'); item.className = 'feed-item';
            const randomUser = "ID: " + Math.floor(Math.random() * 8999 + 1000);
            const randomAction = feedActions[Math.floor(Math.random() * feedActions.length)];
            item.innerHTML = `${randomUser} <span class="${randomAction.type}">${randomAction.text}</span>`;
            container.appendChild(item);
            setTimeout(() => { item.remove(); }, 4000); setTimeout(spawnFeed, Math.random() * 4000 + 2000); 
        }
        setTimeout(spawnFeed, 1500);

        function showToast(message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div'); toast.className = 'toast'; toast.innerText = message;
            container.appendChild(toast); setTimeout(() => { toast.remove(); }, 3500);
        }

        const modal = document.getElementById('vipModal');
        function openModal() { playSound('click'); modal.style.display = 'flex'; setTimeout(() => modal.classList.add('active'), 10); }
        function closeModal() { playSound('click'); modal.classList.remove('active'); setTimeout(() => modal.style.display = 'none', 400); }

        // BIOMETRIC HOLD & HEX SCRAMBLE LOGIC
        const bioBtn = document.getElementById('bioBtn');
        const circle = document.getElementById('progressCircle');
        const bioText = document.getElementById('bioText');
        const keyInput = document.getElementById('keyDisplay');
        const mainCard = document.getElementById('mainCard');
        const empShockwave = document.getElementById('empShockwave');
        const circumference = 295; 
        let holdTimer; let progress = 0; let isGenerating = false; let isComplete = false;

        function setProgress(percent) {
            const offset = circumference - (percent / 100) * circumference;
            circle.style.strokeDashoffset = offset;
        }

        function startHold(e) {
            if(e.type === 'touchstart') e.preventDefault();
            if(isGenerating || isComplete) return;
            playSound('charge');
            bioText.innerText = "SCANNING BIOMETRICS..."; bioText.style.color = "#00e5ff";
            
            holdTimer = setInterval(() => {
                progress += 2.5; 
                setProgress(progress);
                if(progress >= 100) { clearInterval(holdTimer); triggerGeneration(); }
            }, 30); // ~1.2s hold
        }

        function endHold(e) {
            if(e.type === 'touchend') e.preventDefault();
            if(isGenerating || isComplete) return;
            clearInterval(holdTimer); progress = 0; setProgress(0);
            bioText.innerText = "AWAITING BIOMETRICS"; bioText.style.color = "#8a8a9e";
        }

        bioBtn.addEventListener('mousedown', startHold); bioBtn.addEventListener('mouseup', endHold);
        bioBtn.addEventListener('mouseleave', endHold); bioBtn.addEventListener('touchstart', startHold); bioBtn.addEventListener('touchend', endHold);

        // HEXADECIMAL SCRAMBLE (More realistic hacker decode)
        function hexScramble(targetValue, duration) {
            const hexChars = '0123456789ABCDEF';
            let iterations = 0; const maxIterations = 40; 
            const intervalTime = duration / maxIterations;
            keyInput.classList.remove('locked');

            const interval = setInterval(() => {
                keyInput.value = targetValue.split('').map((char, i) => i < iterations / (maxIterations / targetValue.length) ? targetValue[i] : hexChars[Math.floor(Math.random() * hexChars.length)]).join('');
                iterations++;
                if (iterations >= maxIterations) {
                    clearInterval(interval); keyInput.value = targetValue;
                    speakVoice("Decryption Complete. Access Granted.");
                    showToast("Signature Extracted Successfully.");
                    bioText.innerText = "DECRYPTION COMPLETE"; bioText.style.color = "#10ff00";
                    document.querySelector('.bio-icon').style.backgroundImage = "none";
                    document.querySelector('.bio-icon').style.background = "#10ff00";
                    document.querySelector('.bio-icon').style.boxShadow = "0 0 20px #10ff00";
                }
            }, intervalTime);
        }

        async function triggerGeneration() {
            isGenerating = true; isComplete = true;
            bioText.innerText = "OVERLOADING NODE..."; bioText.style.color = "#fff";
            
            playSound('emp');
            empShockwave.classList.add('emp-active');
            mainCard.classList.add('glitch-active');
            
            setTimeout(() => {
                mainCard.classList.remove('glitch-active');
                empShockwave.classList.remove('emp-active');
                
                const today = new Date();
                const dateString = today.getFullYear() + "-" + String(today.getMonth() + 1).padStart(2, '0') + "-" + String(today.getDate()).padStart(2, '0');
                const finalKey = btoa(dateString + "_XIT_SECRET_VIP"); 
                
                hexScramble(finalKey, 1800);
            }, 500); 
        }

        function copyKey() {
            playSound('click');
            if(keyInput.classList.contains('locked') || keyInput.value.includes('•')) { showToast("Error: Verification Required."); return; }
            keyInput.select(); document.execCommand("copy"); showToast("Signature copied to clipboard.");
        }
    </script>
</body>
