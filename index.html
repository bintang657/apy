<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XIT | PROTOCOL V27</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Space+Mono&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #020305;
            --primary: #00e5ff;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(15, 18, 25, 0.9);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #bgCanvas { position: absolute; inset: 0; z-index: -1; opacity: 0.3; }
        .ambient-glow { position: absolute; width: 100vw; height: 100vh; background: radial-gradient(circle at 50% 50%, rgba(0, 229, 255, 0.03) 0%, transparent 80%); z-index: -2; }

        /* ONE-VIEWPORT CARD */
        .apex-card {
            width: 92%; max-width: 360px;
            background: var(--glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
            text-align: center;
        }

        /* HUD AREA */
        .hud-top {
            display: flex; justify-content: space-between;
            font-family: 'Space Mono', monospace; font-size: 8px;
            color: #555; margin-bottom: 20px;
            border-bottom: 1px solid var(--border); padding-bottom: 8px;
        }
        .hud-top span { color: var(--primary); }

        .title { font-size: 26px; font-weight: 800; letter-spacing: -1px; margin-bottom: 2px; }
        .subtitle { font-size: 9px; color: #444; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; }

        /* INTEGRATED LOGS */
        .mini-terminal {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px; height: 55px;
            font-family: 'Space Mono', monospace; font-size: 9px;
            color: #777; text-align: left; overflow: hidden; margin-bottom: 20px;
        }
        .term-line span { color: var(--primary); margin-right: 4px; }

        /* SCANNER MECHANIC (THE FIX) */
        .scan-box {
            position: relative;
            width: 120px; height: 120px;
            margin: 0 auto 20px auto;
            display: flex; justify-content: center; align-items: center;
            /* Disable selection & calls on this specific box */
            touch-action: none;
        }

        .core-btn {
            width: 80px; height: 80px;
            background: #050505;
            border: 2px solid var(--border);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 10;
            transition: all 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .core-btn.active { transform: scale(0.9); border-color: var(--primary); box-shadow: 0 0 30px rgba(0, 229, 255, 0.3); }

        .fingerprint-icon {
            width: 35px; height: 35px;
            border: 2px solid #222; border-radius: 50%;
            position: relative;
        }
        .fingerprint-icon::after { content: ''; position: absolute; inset: 6px; border: 2px solid #222; border-radius: 50%; }
        
        .core-btn.active .fingerprint-icon { border-color: var(--primary); }
        .core-btn.active .fingerprint-icon::after { border-color: var(--primary); }

        .progress-ring {
            position: absolute;
            width: 120px; height: 120px;
            transform: rotate(-90deg);
            pointer-events: none; z-index: 5;
        }
        .progress-ring circle {
            fill: none;
            stroke: var(--primary);
            stroke-width: 4;
            stroke-dasharray: 377; /* 2 * PI * 60 */
            stroke-dashoffset: 377;
            transition: stroke-dashoffset 0.1s linear;
        }

        .status-label { font-size: 10px; font-weight: 700; color: #444; letter-spacing: 2px; margin-top: 10px; }

        /* OUTPUT */
        .key-display {
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px; font-family: 'Space Mono', monospace;
            font-size: 14px; color: #333; text-align: center;
            letter-spacing: 3px; margin-bottom: 20px;
            transition: all 0.4s;
        }
        .key-display.ready { color: #fff; border-color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        /* BUTTONS */
        .btn {
            width: 100%; padding: 15px; border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
            color: #fff; font-weight: 700; font-size: 11px;
            letter-spacing: 1px; cursor: pointer; transition: 0.3s;
            margin-bottom: 10px; text-transform: uppercase;
        }
        .btn-vip { background: var(--primary); color: #000; border: none; font-weight: 800; }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-card { background: #08090a; border: 1px solid #ffcc00; border-radius: 24px; padding: 30px; width: 100%; max-width: 350px; text-align: center; }
        .wa-btn { background: #25D366; color: #000; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: 800; margin-bottom: 10px; }

        #flash { position: fixed; inset: 0; background: #fff; z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
    </style>
</head>
<body>

    <div id="flash"></div>
    <div class="ambient-glow"></div>
    <canvas id="bgCanvas"></canvas>

    <div class="apex-card">
        <div class="hud-top">
            <div>PWR: <span id="battVal">--%</span></div>
            <div>NET: <span id="pingVal">--ms</span></div>
            <div>STB: <span style="color:#00ff88">99%</span></div>
        </div>

        <h1 class="title">SENSI KR XIT</h1>
        <p class="subtitle">Neural Signature</p>

        <div class="mini-terminal" id="term">
            <div class="term-line"><span>></span> Core initialized...</div>
            <div class="term-line"><span>></span> Waiting for biometric hold.</div>
        </div>

        <div class="scan-box">
            <div class="core-btn" id="holdBtn">
                <div class="fingerprint-icon"></div>
            </div>
            <svg class="progress-ring">
                <circle cx="60" cy="60" r="58"></circle>
            </svg>
        </div>
        <div class="status-label" id="label">HOLD TO SCAN</div>

        <div class="key-display" id="keyBox">LOCKED</div>

        <button class="btn" onclick="copyKey()">COPY SIGNATURE</button>
        <button class="btn btn-vip" onclick="openVip()">GET VIP ACCESS</button>
    </div>

    <div class="modal" id="vipModal">
        <div class="modal-card">
            <h2 style="color:#ffcc00; margin-bottom:15px;">LIFETIME VIP</h2>
            <p style="font-size: 11px; color: #555; line-height: 1.6; margin-bottom: 20px;">Manual override enabled, zero-cooldown encryption, and hardware signature locking.</p>
            <button class="wa-btn" onclick="window.open('https://wa.me/+6281225980437')">CONTACT ADMIN 1</button>
            <button class="wa-btn" onclick="window.open('https://wa.me/+6285798209865')">CONTACT ADMIN 2</button>
            <button class="btn" onclick="closeVip()">BACK</button>
        </div>
    </div>

    <script>
        // Disable long-press menu on the whole page for safety
        window.oncontextmenu = function(event) { event.preventDefault(); event.stopPropagation(); return false; };

        // TELEMETRY
        setInterval(() => {
            document.getElementById('pingVal').innerText = Math.floor(Math.random()*5+12) + "ms";
            if(navigator.getBattery) navigator.getBattery().then(b => document.getElementById('battVal').innerText = Math.floor(b.level*100) + "%");
        }, 2000);

        // BG ANIMATION
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let dots = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            dots = [];
            for(let i=0; i<50; i++) dots.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.2, vy: (Math.random()-0.5)*0.2 });
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#00e5ff'; ctx.globalAlpha = 0.15;
            dots.forEach(d => {
                d.x += d.vx; d.y += d.vy;
                if(d.x<0 || d.x>canvas.width) d.vx*=-1; if(d.y<0 || d.y>canvas.height) d.vy*=-1;
                ctx.beginPath(); ctx.arc(d.x, d.y, 1, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        init(); animate(); window.addEventListener('resize', init);

        // THE HOLD FIX LOGIC
        const holdBtn = document.getElementById('holdBtn');
        const ring = document.querySelector('.progress-ring circle');
        const label = document.getElementById('label');
        const term = document.getElementById('term');
        const keyBox = document.getElementById('keyBox');
        let progress = 0; let timer; let isSuccess = false;

        function addLog(msg) {
            const div = document.createElement('div'); div.className = 'term-line';
            div.innerHTML = `<span>></span> ${msg}`; term.appendChild(div);
            if(term.children.length > 3) term.removeChild(term.firstChild);
            term.scrollTop = term.scrollHeight;
        }

        function startHold(e) {
            if(isSuccess) return;
            // PREVENT DEFAULT is key to stopping mobile context menu!
            e.preventDefault(); 
            
            holdBtn.classList.add('active');
            label.innerText = "AUTHENTICATING...";
            label.style.color = "#00e5ff";
            addLog("Bio-scan in progress...");

            timer = setInterval(() => {
                progress += 2.5; 
                ring.style.strokeDashoffset = 377 - (progress / 100) * 377;
                
                if(progress >= 100) {
                    clearInterval(timer);
                    onSuccess();
                }
            }, 40); // Approx 1.6s to finish
        }

        function endHold(e) {
            if(isSuccess) return;
            e.preventDefault();
            
            clearInterval(timer);
            holdBtn.classList.remove('active');
            progress = 0;
            ring.style.strokeDashoffset = 377;
            label.innerText = "HOLD SENSOR";
            label.style.color = "#444";
            addLog("Scan failed: Lifted.");
        }

        // Attach events with stopPropagation
        holdBtn.addEventListener('mousedown', startHold);
        holdBtn.addEventListener('touchstart', startHold, {passive: false});
        
        // Listen globally for lift-up so it cancels even if finger moves off button
        window.addEventListener('mouseup', endHold);
        window.addEventListener('touchend', endHold);

        function onSuccess() {
            isSuccess = true;
            holdBtn.classList.remove('active');
            if(navigator.vibrate) navigator.vibrate(100);

            document.getElementById('flash').style.opacity = 1;
            setTimeout(() => document.getElementById('flash').style.opacity = 0, 800);
            
            label.innerText = "ACCESS GRANTED";
            label.style.color = "#00ff88";
            addLog("Encryption breached.");
            addLog("Key generated.");

            const key = btoa(new Date().toISOString().split('T')[0] + "_XIT_SECRET_VIP");
            keyBox.classList.add('ready');
            keyBox.innerText = key;
        }

        function copyKey() {
            if(!isSuccess) { addLog("Error: Unlocked key first."); return; }
            navigator.clipboard.writeText(keyBox.innerText);
            addLog("Signature copied.");
        }

        function openVip() { document.getElementById('vipModal').style.display='flex'; }
        function closeVip() { document.getElementById('vipModal').style.display='none'; }
    </script>
</body>
</html>
