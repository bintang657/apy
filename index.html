<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSI KR XIT - Access Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #050508;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            perspective: 1000px;
        }

        /* DYNAMIC AURORA BACKGROUND */
        .aurora-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            z-index: -1;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s infinite alternate ease-in-out;
        }
        .orb-1 {
            background: #ff2a5f;
            width: 400px; height: 400px;
            top: -100px; left: -100px;
        }
        .orb-2 {
            background: #00e5ff;
            width: 300px; height: 300px;
            bottom: -50px; right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 100px) scale(1.2); }
        }

        /* MAIN CARD */
        .glass-card {
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 45px 35px;
            width: 380px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            text-align: center;
            position: relative;
            z-index: 1;
            transform-style: preserve-3d;
            transition: transform 0.1s ease;
        }

        .badge {
            background: rgba(255, 42, 95, 0.15);
            color: #ff2a5f;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1.5px;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 42, 95, 0.3);
        }

        .app-title {
            font-size: 32px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            font-weight: 400;
            color: #8a8a9e;
            margin-bottom: 35px;
        }

        .input-group { position: relative; margin-bottom: 20px; }

        .key-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 18px;
            width: 100%;
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            outline: none;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            user-select: text;
        }
        .key-input:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 0 4px rgba(0, 229, 255, 0.15);
        }

        .btn {
            border: none;
            padding: 16px 20px;
            width: 100%;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn:hover { transform: translateY(-3px); }
        .btn:active { transform: translateY(1px); }

        .btn-primary {
            background: #ffffff;
            color: #050508;
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.15);
        }
        .btn-primary:hover { box-shadow: 0 12px 30px rgba(255, 255, 255, 0.25); background: #f0f0f0; }

        .btn-secondary {
            background: transparent;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.05); }

        .timer-wrapper {
            background: linear-gradient(145deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
            border-radius: 14px;
            padding: 15px;
            margin-top: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .timer-label { font-size: 11px; color: #8a8a9e; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; font-weight: 600; }
        .timer-value { color: #ffffff; font-size: 22px; font-weight: 800; letter-spacing: 2px; }

        .btn-vip-link {
            color: #ffcc00;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s;
            display: inline-block;
        }
        .btn-vip-link:hover { color: #ffe680; text-shadow: 0 0 10px rgba(255, 204, 0, 0.3); }

        /* TOAST NOTIFICATION */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            background: rgba(20, 20, 25, 0.9);
            backdrop-filter: blur(10px);
            border-left: 4px solid #00e5ff;
            color: #fff;
            padding: 16px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideIn 0.4s cubic-bezier(0.25, 0.8, 0.25, 1) forwards, slideOut 0.4s 2.6s forwards;
            opacity: 0;
            transform: translateX(100%);
        }
        @keyframes slideIn { to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { to { transform: translateX(100%); opacity: 0; } }

        /* VIP MODAL */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 100; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.4s ease;
        }
        .modal-card {
            background: #0a0a0f; border: 1px solid rgba(255, 204, 0, 0.2); border-radius: 28px;
            padding: 45px 35px; width: 360px; text-align: center;
            transform: translateY(30px) scale(0.95); transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-overlay.active .modal-card { transform: translateY(0) scale(1); }

        .modal-badge {
            background: rgba(255, 204, 0, 0.1); color: #ffcc00; padding: 6px 14px; border-radius: 20px;
            font-size: 11px; font-weight: 800; letter-spacing: 1.5px; display: inline-block; margin-bottom: 15px;
        }
        .modal-title { font-size: 24px; font-weight: 800; color: #ffffff; margin-bottom: 5px; }
        .modal-price { font-size: 36px; font-weight: 800; color: #ffcc00; margin-bottom: 25px; }
        
        .modal-features { text-align: left; margin-bottom: 35px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 16px; }
        .feature-item { font-size: 14px; color: #b0b0c0; margin-bottom: 12px; display: flex; align-items: flex-start; font-weight: 400; }
        .feature-item:last-child { margin-bottom: 0; }
        .feature-item::before { content: '✓'; color: #ffcc00; font-weight: bold; margin-right: 12px; font-size: 14px; }

        .founder-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .btn-founder {
            background: #25D366; color: #ffffff; border: none; padding: 14px; border-radius: 12px;
            font-size: 13px; font-weight: 800; cursor: pointer; transition: all 0.2s;
        }
        .btn-founder:hover { background: #20b858; transform: translateY(-2px); box-shadow: 0 8px 15px rgba(37, 211, 102, 0.3); }

        .btn-close { background: transparent; color: #8a8a9e; border: none; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: color 0.2s; }
        .btn-close:hover { color: #ffffff; }

        /* SPINNER */
        .spinner {
            display: none; width: 22px; height: 22px; border: 2.5px solid rgba(0, 0, 0, 0.2);
            border-radius: 50%; border-top-color: #000; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="aurora-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="glass-card" id="mainCard">
        <div class="badge">SECURE PORTAL</div>
        <div class="app-title">SENSI KR XIT</div>
        <p class="subtitle">Cloud Authentication Engine</p>

        <div class="input-group">
            <input type="text" id="keyDisplay" class="key-input" value="Awaiting Generate..." readonly>
        </div>

        <button class="btn btn-primary" id="btnGen" onclick="generateKey()">
            <span id="btnText">GENERATE 24H KEY</span>
            <div class="spinner" id="btnSpinner"></div>
        </button>
        
        <button class="btn btn-secondary" onclick="copyKey()">COPY TO CLIPBOARD</button>

        <div class="timer-wrapper">
            <div class="timer-label">Session Valid Until</div>
            <div class="timer-value" id="countdown">00:00:00</div>
        </div>

        <span class="btn-vip-link" onclick="openModal()">Upgrade to Lifetime VIP</span>
    </div>

    <div class="modal-overlay" id="vipModal">
        <div class="modal-card">
            <div class="modal-badge">PREMIUM ACCESS</div>
            <div class="modal-title">Lifetime License</div>
            <div class="modal-price">Rp 45.000</div>
            
            <div class="modal-features">
                <div class="feature-item">Akses selamanya tanpa batas</div>
                <div class="feature-item">Bebas proses generate harian</div>
                <div class="feature-item">Prioritas perlindungan Anti-Ban</div>
                <div class="feature-item">Private HWID Lock System</div>
            </div>

            <div class="founder-grid">
                <button class="btn-founder" onclick="window.location.href='https://wa.me/+6281225980437'">FOUNDER 1</button>
                <button class="btn-founder" onclick="window.location.href='https://wa.me/+6285798209865'">FOUNDER 2</button>
            </div>
            
            <button class="btn-close" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script>
        // Disable Inspect Elements
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(event.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 67 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
        }

        // 3D Tilt Effect on Desktop
        const card = document.getElementById('mainCard');
        document.addEventListener('mousemove', (e) => {
            if(window.innerWidth > 768) {
                let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
                let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            }
        });
        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        // Smart Toast Notification System
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            if(type === 'error') toast.style.borderLeftColor = '#ff2a5f';
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3000);
        }

        // Countdown Timer
        function updateTimer() {
            const now = new Date();
            const tomorrow = new Date(now);
            tomorrow.setHours(24, 0, 0, 0); 
            const diff = tomorrow - now;
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('countdown').innerText = 
                String(h).padStart(2, '0') + ":" + String(m).padStart(2, '0') + ":" + String(s).padStart(2, '0');
        }
        setInterval(updateTimer, 1000); updateTimer();

        // Modal Control
        const modal = document.getElementById('vipModal');
        function openModal() { 
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
        }
        function closeModal() { 
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 400);
        }

        // Generate Engine
        async function generateKey() {
            const btn = document.getElementById('btnGen');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('btnSpinner');
            const keyInput = document.getElementById('keyDisplay');
            
            btn.disabled = true; btn.style.cursor = 'wait';
            btnText.style.display = 'none'; spinner.style.display = 'block';
            keyInput.value = "Authenticating...";

            await new Promise(resolve => setTimeout(resolve, 1200));

            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const dateString = yyyy + "-" + mm + "-" + dd;
            
            const generatedKey = btoa(dateString + "_XIT_SECRET_VIP"); 
            
            keyInput.value = generatedKey;
            btn.disabled = false; btn.style.cursor = 'pointer';
            btnText.style.display = 'block'; btnText.innerText = "KEY GENERATED";
            spinner.style.display = 'none';
            
            showToast("Success: Daily Key Generated!");
        }

        // Copy Engine
        function copyKey() {
            const keyInput = document.getElementById('keyDisplay');
            if(keyInput.value === "Awaiting Generate..." || keyInput.value === "Authenticating...") {
                showToast("Action Denied: Generate a key first.", "error");
                return;
            }
            keyInput.select();
            keyInput.setSelectionRange(0, 99999);
            document.execCommand("copy");
            
            showToast("Copied: Key saved to clipboard!");
        }
    </script>
</body>
</html>
