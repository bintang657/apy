<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XIT | VOID CORE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Space+Mono&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #050505;
            --primary: #00e5ff;
            --accent: #7000ff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        /* BACKGROUND NEURAL MESH */
        #canvas { position: absolute; inset: 0; z-index: -1; opacity: 0.4; }

        /* MAIN PREMIUM CARD */
        .container {
            width: 90%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .header-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 229, 255, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--primary);
            border: 1px solid rgba(0, 229, 255, 0.2);
            margin-bottom: 20px;
        }

        .header-status .dot {
            width: 6px; height: 6px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .title { font-size: 30px; font-weight: 800; letter-spacing: -1px; margin-bottom: 5px; }
        .subtitle { font-size: 11px; color: #888; letter-spacing: 3px; margin-bottom: 30px; font-weight: 400; text-transform: uppercase; }

        /* INTEGRATED TERMINAL */
        .terminal {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            height: 70px;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: #aaa;
            text-align: left;
            overflow: hidden;
            margin-bottom: 25px;
            position: relative;
        }
        .term-line { margin-bottom: 4px; display: block; }
        .term-line span { color: var(--primary); }

        /* VOID CORE SCANNER (HOLD) */
        .scanner-wrap {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .core-btn {
            width: 90px;
            height: 90px;
            background: radial-gradient(circle, #111 0%, #000 100%);
            border: 2px solid var(--border);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.2s, border-color 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .core-btn:active { transform: scale(0.95); }
        .core-btn .icon { width: 30px; height: 30px; border: 2px solid #333; border-radius: 50%; position: relative; }
        .core-btn .icon::after { content: ''; position: absolute; inset: 6px; border: 2px solid #333; border-radius: 50%; }

        .progress-ring {
            position: absolute;
            inset: 0;
            width: 120px;
            height: 120px;
            transform: rotate(-90deg);
            pointer-events: none;
        }

        .progress-ring circle {
            fill: none;
            stroke: var(--primary);
            stroke-width: 3;
            stroke-dasharray: 377;
            stroke-dashoffset: 377;
            transition: stroke-dashoffset 0.1s linear, stroke 0.3s;
        }

        .scanner-label { font-size: 10px; font-weight: 700; color: #555; letter-spacing: 2px; margin-top: 15px; transition: color 0.3s; }

        /* OUTPUT KEY */
        .key-box {
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            font-family: 'Space Mono', monospace;
            font-size: 15px;
            color: #555;
            letter-spacing: 3px;
            margin-bottom: 25px;
            transition: all 0.3s;
        }
        .key-box.active { color: #fff; border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 229, 255, 0.2); }

        /* ACTION BUTTONS */
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            color: #fff;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .btn:hover { background: rgba(255,255,255,0.08); border-color: var(--primary); }
        .btn-vip { background: var(--primary); color: #000; border: none; margin-top: 10px; }
        .btn-vip:hover { background: #fff; box-shadow: 0 0 30px var(--primary); }

        /* VIP MODAL */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000;
            justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(10px);
        }
        .modal-card {
            background: #0a0a0a; border: 1px solid #ffcc00; border-radius: 20px; padding: 40px;
            width: 100%; max-width: 380px; text-align: center;
        }
        .modal-card h2 { color: #ffcc00; margin-bottom: 20px; }
        .wa-btn { background: #25D366; color: #000; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: 800; margin-bottom: 10px; cursor: pointer; }

        /* OVERLAYS */
        #flash { position: fixed; inset: 0; background: #fff; z-index: 2000; opacity: 0; pointer-events: none; }
        .cursor { position: fixed; width: 20px; height: 20px; border: 1px solid var(--primary); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 5000; transition: transform 0.1s; }

        @media (max-width: 768px) {
            .container { padding: 30px 20px; }
            .cursor { display: none; }
        }
    </style>
</head>
<body>

    <div id="flash"></div>
    <div class="cursor" id="cursor"></div>
    <canvas id="canvas"></canvas>

    <div class="container" id="card">
        <div class="header-status">
            <div class="dot"></div> SERVER ONLINE
        </div>

        <h1 class="title">SENSI KR XIT</h1>
        <p class="subtitle">Neural Access Portal</p>

        <div class="terminal" id="term">
            <span class="term-line"><span>></span> System standby.</span>
            <span class="term-line"><span>></span> Awaiting biometric hold...</span>
        </div>

        <div class="scanner-wrap">
            <div class="core-btn" id="coreBtn">
                <div class="icon" id="coreIcon"></div>
            </div>
            <svg class="progress-ring">
                <circle cx="60" cy="60" r="58"></circle>
            </svg>
            <div class="scanner-label" id="statusLabel">HOLD TO SCAN</div>
        </div>

        <div class="key-box" id="keyBox">LOCKED</div>

        <button class="btn" onclick="copyKey()">COPY SIGNATURE</button>
        <button class="btn btn-vip" onclick="openVip()">GET VIP ACCESS</button>
    </div>

    <div class="modal" id="vipModal">
        <div class="modal-card">
            <h2>LIFETIME VIP</h2>
            <p style="font-size: 12px; color: #888; margin-bottom: 25px; line-height: 1.6;">Akses permanen tanpa batas harian.<br>Prioritas Anti-Ban & Auto Clear Cache.<br>Linked to HWID.</p>
            <button class="wa-btn" onclick="window.open('https://wa.me/+6281225980437')">CONTACT ADMIN 1</button>
            <button class="wa-btn" onclick="window.open('https://wa.me/+6285798209865')">CONTACT ADMIN 2</button>
            <button class="btn" onclick="closeVip()" style="margin-top: 10px;">BACK</button>
        </div>
    </div>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());

        // CURSOR PC
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
            // 3D PARALLAX
            const x = (window.innerWidth / 2 - e.clientX) / 40;
            const y = (window.innerHeight / 2 - e.clientY) / 40;
            document.getElementById('card').style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });

        // BACKGROUND PARTICLES
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            dots = [];
            for(let i=0; i<80; i++) dots.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5), vy: (Math.random()-0.5) });
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#00e5ff'; ctx.globalAlpha = 0.3;
            dots.forEach((d, i) => {
                d.x += d.vx; d.y += d.vy;
                if(d.x<0 || d.x>canvas.width) d.vx*=-1; if(d.y<0 || d.y>canvas.height) d.vy*=-1;
                ctx.beginPath(); ctx.arc(d.x, d.y, 1.5, 0, Math.PI*2); ctx.fill();
                for(let j=i+1; j<dots.length; j++){
                    let dist = Math.hypot(d.x-dots[j].x, d.y-dots[j].y);
                    if(dist<100){ ctx.strokeStyle='#00e5ff'; ctx.lineWidth=0.5; ctx.globalAlpha=0.1; ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(dots[j].x, dots[j].y); ctx.stroke(); }
                }
            });
            requestAnimationFrame(animate);
        }
        init(); animate(); window.addEventListener('resize', init);

        // AUDIO
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, type='sine', vol=0.05, duration=0.1) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = type; o.frequency.value = f; o.connect(g); g.connect(audioCtx.destination);
            g.gain.setValueAtTime(vol, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+duration);
            o.start(); o.stop(audioCtx.currentTime+duration);
        }

        // HOLD TO SCAN LOGIC
        const coreBtn = document.getElementById('coreBtn');
        const ring = document.querySelector('.progress-ring circle');
        const statusLabel = document.getElementById('statusLabel');
        const term = document.getElementById('term');
        let holdTimer;
        let progress = 0;
        let isSuccess = false;

        function addLog(txt) {
            const line = document.createElement('span');
            line.className = 'term-line';
            line.innerHTML = `<span>></span> ${txt}`;
            term.appendChild(line);
            if(term.children.length > 3) term.removeChild(term.firstChild);
        }

        function startHold(e) {
            if(isSuccess) return;
            if(e.type === 'touchstart') e.preventDefault();
            
            progress = 0;
            statusLabel.innerText = "SCANNING...";
            statusLabel.style.color = "#00e5ff";
            addLog("Auth sequence started.");
            playSfx(400, 'triangle', 0.1, 0.5);

            holdTimer = setInterval(() => {
                progress += 2;
                ring.style.strokeDashoffset = 377 - (progress / 100) * 377;
                if(progress % 20 === 0) playSfx(200 + progress*5, 'sine', 0.05);

                if(progress >= 100) {
                    clearInterval(holdTimer);
                    completeScan();
                }
            }, 30);
        }

        function endHold() {
            if(isSuccess) return;
            clearInterval(holdTimer);
            if(progress < 100) {
                progress = 0;
                ring.style.strokeDashoffset = 377;
                statusLabel.innerText = "HOLD TO SCAN";
                statusLabel.style.color = "#555";
                addLog("Auth failed: Interrupted.");
                playSfx(150, 'sawtooth', 0.1);
            }
        }

        coreBtn.addEventListener('mousedown', startHold);
        coreBtn.addEventListener('mouseup', endHold);
        coreBtn.addEventListener('mouseleave', endHold);
        coreBtn.addEventListener('touchstart', startHold);
        coreBtn.addEventListener('touchend', endHold);

        function completeScan() {
            isSuccess = true;
            document.getElementById('flash').style.opacity = 1;
            setTimeout(() => document.getElementById('flash').style.opacity = 0, 800);
            
            statusLabel.innerText = "ACCESS GRANTED";
            statusLabel.style.color = "#00ff88";
            document.getElementById('coreIcon').style.borderColor = "#00ff88";
            document.getElementById('coreIcon').style.background = "rgba(0,255,136,0.2)";
            
            addLog("Neural link 100% stable.");
            addLog("Key extracted.");
            playSfx(800, 'sine', 0.1, 1);

            const key = btoa(new Date().toISOString().split('T')[0] + "_XIT_SECRET_VIP");
            const box = document.getElementById('keyBox');
            box.classList.add('active');
            
            // Type effect
            let i = 0; box.innerText = "";
            let iv = setInterval(() => {
                box.innerText += key[i]; i++;
                if(i >= key.length) clearInterval(iv);
            }, 40);
        }

        function copyKey() {
            const box = document.getElementById('keyBox');
            if(!isSuccess) { playSfx(100, 'square'); addLog("Error: Auth required."); return; }
            const el = document.createElement('textarea'); el.value = box.innerText;
            document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            addLog("Key copied to clipboard.");
            playSfx(1000, 'sine');
        }

        function openVip() { document.getElementById('vipModal').style.display='flex'; }
        function closeVip() { document.getElementById('vipModal').style.display='none'; }
    </script>
</body>
</html>
